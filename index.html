<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CVAP Crossfilter Table</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    @font-face {
      font-family: "Benton";
      src: url("Benton Sans/Benton Sans Book.otf");
    }

    @font-face {
      font-family: "BentonStrong";
      src: url("Benton Sans/Benton Sans Bold.otf");
    }

    @font-face {
      font-family: "BentonMedium";
      src: url("Benton Sans/Benton Sans Medium.otf");
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Benton", Arial, sans-serif;
      color: #000;
      background: #fff;
    }

    .page {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid #ddd;
      padding: 20px;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
    }

    .main {
      padding: 20px;
      overflow: visible;
    }

    h1 {
      font-family: "BentonStrong", Arial, sans-serif;
      font-size: 28px;
      margin: 0 0 10px;
      line-height: 1.1;
    }

    h2 {
      font-family: "BentonStrong", Arial, sans-serif;
      font-size: 22px;
      margin: 0 0 10px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .tab-btn {
      width: 50%;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      padding: 8px 14px;
      cursor: pointer;
      font-family: "BentonMedium", Arial, sans-serif;
      font-size: 12px;
    }

    .tab-btn.active {
      background: #000;
      color: #fff;
    }

    #source {
      font-size: 12px;
      line-height: 1.35;
      margin: 10px 0 14px;
    }

    #resetFilters {
      border: 1px solid #000;
      background: #fff;
      color: #000;
      padding: 8px 12px;
      cursor: pointer;
      margin-bottom: 16px;
      font-family: "BentonMedium", Arial, sans-serif;
      font-size: 12px;
    }

    #resetFilters:hover {
      background: #000;
      color: #fff;
    }

    .count {
      font-size: 16px;
      margin-bottom: 20px;
      color: #555;
    }

    .histogram-block {
      margin-bottom: 14px;
    }

    .histogram-title {
      font-family: "BentonStrong", Arial, sans-serif;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .filter-range {
      font-size: 12px;
      color: #666;
      margin-bottom: 2px;
      min-height: 14px;
    }

    .histogram svg {
      overflow: visible;
      display: block;
    }

    .bar {
      fill: #000;
    }

    .bar.inactive {
      fill: #ddd;
    }

    .axis text {
      font-family: "Benton", Arial, sans-serif;
      font-size: 10px;
      fill: #000;
    }

    .axis path,
    .axis line {
      stroke: #999;
      shape-rendering: crispEdges;
    }

    .brush .selection {
      fill: #FFCF01;
      fill-opacity: 0.18;
      stroke-width: 1;
    }

    .brush .handle {
      fill: #FFCF01;
      stroke: #FFCF01;
      cursor: ew-resize;
    }

    .brush .overlay {
      cursor: crosshair;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
      font-size: 12px;
    }

    th {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 2px solid #111;
      padding: 0;
      height: 120px;
      vertical-align: bottom;
      cursor: pointer;
      z-index: 2;
      overflow: visible;
      text-align: left;
      border-bottom:1px solid black;

    }

    th span {
      display: inline-block;
      white-space: wrap;
      transform: rotate(-90deg);
      transform-origin: left bottom;
      position: relative;
      left: 30px;
      bottom: 0px;
      width: 100px;
      line-height: 1;
      font-family: "BentonMedium",  sans-serif;
    }

    thead,
    tr {
      overflow: visible;
    }

    td {
      border-bottom: 1px solid #ddd;
      padding: 5px 4px;
      white-space: normal;
      word-break: break-word;
      vertical-align: top;
    }

    th:first-child,
    td:first-child {
      width: 150px;
    }

    th:not(:first-child),
    td:not(:first-child) {
      width: 50px;
    }

    tr:hover {
      background: #f5f5f5;
    }

    td.percent-cell {
      background:#EBEAE9;
    }

    .state-row td {
      background: #000;
      color: #fff;
      font-family: "BentonStrong", Arial, sans-serif;
      font-size: 14px;
      padding: 8px;
      border-bottom: none;
    }

    .state-row:hover {
      background: inherit;
    }
  </style>
</head>

<body>
  <div class="page">
    <aside class="sidebar">
      <h1>Citizen Voting Age Population</h1>

      <div class="tabs">
        <button class="tab-btn active" data-key="lower">Lower House</button>
        <button class="tab-btn" data-key="upper">Upper House</button>
      </div>

      <div id="source">
        <b>Data source:</b> Census Bureau, American Community Survey, 5-year estimates of citizen voting age population, 2020-24
      </div>

      <button id="resetFilters">Reset filters</button>
      <div id="filters"></div>
    </aside>

    <main class="main">
      <h2 id="tableTitle">Lower House districts</h2>
      <div class="count" id="count"></div>
      <div id="table"></div>
    </main>
  </div>

  <script>
    const datasets = {
      lower: {
        label: "Lower House",
        tableTitle: "Lower House districts",
        file: "lower_percent.csv"
      },
      upper: {
        label: "Upper House",
        tableTitle: "Upper House districts",
        file: "upper_percent.csv"
      }
    };

    const filterColumns = [
      "American Indian or Alaska Native Alone %",
      "Asian Alone %",
      "Black or African American Alone %",
      "Native Hawaiian or Other Pacific Islander Alone %",
      "White Alone %",
      "Hispanic or Latino %"
    ];

    const displayColumns = [
      "geoname",
      "Total",
      "American Indian or Alaska Native Alone",
      "American Indian or Alaska Native Alone %",
      "Asian Alone",
      "Asian Alone %",
      "Black or African American Alone",
      "Black or African American Alone %",
      "Native Hawaiian or Other Pacific Islander Alone",
      "Native Hawaiian or Other Pacific Islander Alone %",
      "White Alone",
      "White Alone %",
      "Hispanic or Latino",
      "Hispanic or Latino %"
    ];

    const activeFilters = {};
    const histograms = {};

    let data = [];
    let currentDatasetKey = "lower";
    let sortColumn = null;
    let sortAscending = true;
    let isRestoringBrushes = false;

    filterColumns.forEach(col => {
      activeFilters[col] = null;
    });

    loadDataset(currentDatasetKey);

    d3.selectAll(".tab-btn").on("click", function () {
      const key = d3.select(this).attr("data-key");
      if (key === currentDatasetKey) return;

      currentDatasetKey = key;

      d3.selectAll(".tab-btn").classed("active", false);
      d3.select(this).classed("active", true);

      loadDataset(currentDatasetKey);
    });

    d3.select("#resetFilters").on("click", () => {
      filterColumns.forEach(col => {
        activeFilters[col] = null;
      });

      Object.values(histograms).forEach(chart => {
        chart.brushG.call(chart.brush.move, chart.x.range());
      });

      update();
    });

    function loadDataset(key) {
      const dataset = datasets[key];

      d3.select("#tableTitle").text(dataset.tableTitle);
      d3.select("#filters").selectAll("*").remove();
      d3.select("#table").selectAll("*").remove();
      d3.select("#count").text("Loading...");

      Object.keys(histograms).forEach(key => {
        delete histograms[key];
      });

      d3.csv(dataset.file, d3.autoType).then(raw => {
        data = raw;

        drawFilters();
        restoreBrushSelections();
        update();
      });
    }

    function sanitizeId(str) {
      return str.replace(/[^a-zA-Z0-9]/g, "_");
    }

    function getFilteredData() {
      return data.filter(d => {
        return filterColumns.every(col => {
          const filter = activeFilters[col];
          if (!filter) return true;

          const value = +d[col];
          return value >= filter[0] && value <= filter[1];
        });
      });
    }

    function drawFilters() {
      const container = d3.select("#filters");

      filterColumns.forEach(col => {
        const block = container
          .append("div")
          .attr("class", "histogram-block");

        block.append("div")
          .attr("class", "histogram-title")
          .text(col);

        block.append("div")
          .attr("class", "filter-range")
          .attr("id", `label-${sanitizeId(col)}`)
          .text("All values selected");

        const chart = block.append("div")
          .attr("class", "histogram");

        drawHistogram(chart, col);
      });
    }

    function drawHistogram(container, col) {
      const margin = { top: 0, right: 0, bottom: 16, left: 25 };
      const width = 300 - margin.left - margin.right;
      const height = 60 - margin.top - margin.bottom;

      const values = data
        .map(d => +d[col])
        .filter(d => !isNaN(d));

      const maxValue = d3.max(values) || 0;

      const x = d3.scaleLinear()
        .domain([0, maxValue])
        .nice()
        .range([0, width]);

      const bins = d3.bin()
        .domain(x.domain())
        .thresholds(18)(values);

      const y = d3.scaleLinear()
        .domain([0, d3.max(bins, d => d.length) || 0])
        .nice()
        .range([height, 0]);

      const svg = container.append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom);

      const g = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const bars = g.selectAll(".bar")
        .data(bins)
        .join("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.x0) + 1)
        .attr("y", d => y(d.length))
        .attr("width", d => Math.max(0, x(d.x1) - x(d.x0) - 1))
        .attr("height", d => height - y(d.length));

      g.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${height})`)
        .call(
          d3.axisBottom(x)
            .ticks(4)
            .tickFormat(d => d + "%")
        );

      g.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y).ticks(3));

      const brush = d3.brushX()
        .handleSize(6)
        .extent([[0, 0], [width, height]])
        .on("brush", event => {
          if (isRestoringBrushes) return;

          setFilterFromBrush(col, event.selection, x);

          updateHistogramHighlights();
          updateFilterLabels();
          updateCount(getFilteredData());
        })
        .on("end", event => {
          if (isRestoringBrushes) return;

          setFilterFromBrush(col, event.selection, x);

          update();
        });

      const brushG = g.append("g")
        .attr("class", "brush")
        .call(brush);

      histograms[col] = {
        x,
        bars,
        brushG,
        brush
      };
    }

    function setFilterFromBrush(col, selection, x) {
      if (!selection) {
        activeFilters[col] = null;
        return;
      }

      const fullRange = x.range();
      const isFullExtent =
        Math.abs(selection[0] - fullRange[0]) < 0.5 &&
        Math.abs(selection[1] - fullRange[1]) < 0.5;

      if (isFullExtent) {
        activeFilters[col] = null;
      } else {
        activeFilters[col] = selection.map(x.invert);
      }
    }

    function restoreBrushSelections() {
      isRestoringBrushes = true;

      filterColumns.forEach(col => {
        const filter = activeFilters[col];
        const chart = histograms[col];

        if (!chart) return;

        const selection = filter
          ? filter.map(chart.x)
          : chart.x.range();

        chart.brushG.call(chart.brush.move, selection);
      });

      isRestoringBrushes = false;
    }

    function update() {
      const filtered = getFilteredData();

      updateHistogramHighlights();
      updateFilterLabels();
      updateCount(filtered);
      updateTable(filtered);
    }

    function updateHistogramHighlights() {
      filterColumns.forEach(col => {
        const chart = histograms[col];
        const filter = activeFilters[col];

        if (!chart) return;

        chart.bars.classed("inactive", d => {
          if (!filter) return false;

          const midpoint = (d.x0 + d.x1) / 2;
          return midpoint < filter[0] || midpoint > filter[1];
        });
      });
    }

    function updateFilterLabels() {
      filterColumns.forEach(col => {
        const filter = activeFilters[col];
        const label = d3.select(`#label-${sanitizeId(col)}`);

        if (!filter) {
          label.text("All values selected");
          return;
        }

        label.text(`${filter[0].toFixed(1)}% – ${filter[1].toFixed(1)}%`);
      });
    }

    function updateCount(filtered) {
      d3.select("#count")
        .text(`${filtered.length.toLocaleString()} of ${data.length.toLocaleString()} rows shown`);
    }

    function updateTable(filtered) {
      let rows = [...filtered];

      rows.sort((a, b) => {
        const stateCompare = d3.ascending(
          getStateFromGeoname(a.geoname),
          getStateFromGeoname(b.geoname)
        );

        if (stateCompare !== 0) return stateCompare;

        return d3.ascending(
          formatDistrictName(a.geoname),
          formatDistrictName(b.geoname)
        );
      });

      if (sortColumn) {
        rows.sort((a, b) => {
          const av = a[sortColumn];
          const bv = b[sortColumn];

          if (typeof av === "number" && typeof bv === "number") {
            return sortAscending ? av - bv : bv - av;
          }

          return sortAscending
            ? d3.ascending(String(av), String(bv))
            : d3.descending(String(av), String(bv));
        });
      }

      const tableContainer = d3.select("#table");
      tableContainer.selectAll("*").remove();

      const table = tableContainer.append("table");
      const thead = table.append("thead");
      const tbody = table.append("tbody");

      thead.append("tr")
        .selectAll("th")
        .data(displayColumns)
        .join("th")
        .html(d => `<span>${d}</span>`)
        .on("click", (event, col) => {
          if (sortColumn === col) {
            sortAscending = !sortAscending;
          } else {
            sortColumn = col;
            sortAscending = true;
          }

          update();
        });

      const rowsByState = d3.group(
        rows,
        d => getStateFromGeoname(d.geoname)
      );

      for (const [state, stateRows] of rowsByState) {
        tbody.append("tr")
          .attr("class", "state-row")
          .append("td")
          .attr("colspan", displayColumns.length)
          .text(`${state} (${stateRows.length.toLocaleString()})`);

        const stateTr = tbody.selectAll(`.row-${sanitizeId(state)}`)
          .data(stateRows)
          .join("tr")
          .attr("class", `row-${sanitizeId(state)}`);

        stateTr.selectAll("td")
          .data(row => displayColumns.map(col => ({
            col,
            value: row[col]
          })))
          .join("td")
          .classed("percent-cell", d => d.col.includes("%"))
          .text(d => formatCell(d.value, d.col));
      }
    }

    function getStateFromGeoname(geoname) {
      if (!geoname) return "Unknown";
      const parts = String(geoname).split(",");
      return parts.length > 1 ? parts[parts.length - 1].trim() : "Unknown";
    }

    function formatDistrictName(geoname) {
      if (!geoname) return "";

      const districtName = String(geoname).split(",")[0].trim();

      const match = districtName.match(
        /^(\d+(?:st|nd|rd|th))\s+(.+?)\s+District(\s*\(.*?\))?$/i
      );

      if (!match) return districtName;

      const number = match[1];
      const name = match[2];
      const year = match[3] || "";

      return `${name} District ${number}${year}`;
    }

    function formatCell(value, col) {
      if (value == null) return "";

      if (col === "geoname") {
        return formatDistrictName(value);
      }

      if (col.includes("%")) {
        return Number(value).toFixed(2) + "%";
      }

      if (typeof value === "number") {
        return value.toLocaleString();
      }

      return value;
    }
  </script>
</body>
</html>
